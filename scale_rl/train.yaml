# Pipeline RL training configuration
# All keys map 1-to-1 onto TrainerConfig (scale_rl/trainer/config.py).

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_path: "Qwen/Qwen3-1.7B"
dtype: "bfloat16"

# ---------------------------------------------------------------------------
# Dataset
# ---------------------------------------------------------------------------
dataset: "dapo"   # "dapo" | "livecodebench"
dataset_split: "train"

# ---------------------------------------------------------------------------
# Optimiser
# ---------------------------------------------------------------------------
lr: 1.0e-6
weight_decay: 0.01
max_grad_norm: 1.0
gradient_checkpointing: true
gradient_accumulation_steps: 4   # splits each batch into micro-batches; reduces peak activation memory

# ---------------------------------------------------------------------------
# RL algorithm
# grpo | dapo | reinforce | gspo | cispo | maxrl
# ---------------------------------------------------------------------------
algorithm: "cispo"
clip_eps: 0.2          # symmetric clip for grpo/gspo (ignored by dapo)
clip_low: 0.8          # dapo asymmetric lower bound
clip_high: 0.28        # dapo asymmetric upper bound
kl_coef: 0.0           # KL penalty coefficient (0 = disabled)
tis_C: 0.0             # temporal IS truncation threshold (0 = disabled)

# ---------------------------------------------------------------------------
# Sequence
# ---------------------------------------------------------------------------
max_seq_len: 8192

# ---------------------------------------------------------------------------
# Rollout / replay buffer
# Total rollouts per collection round = prompts_per_batch * rollouts_per_step
# ---------------------------------------------------------------------------
prompts_per_batch: 8
rollouts_per_step: 4   # G in GRPO/DAPO
stale_steps: 2         # sync trainer → vLLM every K gradient updates
rollout_worker_url: "http://127.0.0.1:8047"

# ---------------------------------------------------------------------------
# Generation (vLLM rollout worker)
# ---------------------------------------------------------------------------
max_new_tokens: 1024
temperature: 1.0
top_k: -1              # -1 = disabled

# ---------------------------------------------------------------------------
# FSDP
# ---------------------------------------------------------------------------
# Sharding strategy — choose one:
#   no_shard          – no sharding; single GPU or DDP-equivalent (default, vLLM-compatible)
#   full_shard        – shard params + grads + optimizer states (ZeRO-3); multi-GPU single-node
#   shard_grad_op     – shard grads + optimizer states only (ZeRO-2); multi-GPU single-node
#   hybrid_shard      – full_shard within node, replicate across nodes; multi-node, needs 2D mesh
#   hybrid_shard_zero2– shard_grad_op within node, replicate across nodes; multi-node, needs 2D mesh
fsdp_sharding_strategy: "no_shard"
sync_module_states: true

# ---------------------------------------------------------------------------
# NCCL weight transfer (trainer → vLLM)
# ---------------------------------------------------------------------------
# torchrun rendezvous port
master_address: "127.0.0.1"
master_port: 29600
# separate port for vLLM StatelessProcessGroup rendezvous (must differ from master_port)
weight_transfer_port: 29601
weight_transfer_packed: false  # packed=True triggers a vLLM/torch 2.10 API incompatibility (src= vs root=)

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
total_steps: 50
log_every: 10
high_pass_rate_threshold: 0.9
low_pass_rate_threshold: 0.1   # 0 = disabled; prompts with pass_rate <= this are dropped as too hard

eval_every: 50          # evaluate on AIME 2025 every N trainer steps (0 = disabled)
eval_k: 4               # samples per problem, for pass@k
eval_max_tokens: 8192
eval_temperature: 0.6
eval_top_k: -1

# ---------------------------------------------------------------------------
# Wandb
# ---------------------------------------------------------------------------
wandb_project: "ScaleRL"
wandb_run_name: ""     # empty = wandb auto-names the run
wandb_enabled: false

# ---------------------------------------------------------------------------
# Infrastructure
# ---------------------------------------------------------------------------
# GPU IDs for the FSDP trainer (torchrun --nproc-per-node = length of this list).
trainer_gpu_ids: [0]

# GPU IDs reserved for the vLLM rollout worker (tensor_parallel_size = length of this list).
vllm_gpu_ids: [1]

# vLLM engine settings (passed to rollout_worker.py)
vllm_gpu_memory_utilization: 0.9
vllm_weight_transfer_backend: "nccl"
vllm_clear_kv_cache: false
